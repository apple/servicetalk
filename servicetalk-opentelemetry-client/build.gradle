apply plugin: "io.servicetalk.servicetalk-gradle-plugin-internal-library"

dependencies {
  implementation project(":servicetalk-annotations")
  implementation project(":servicetalk-concurrent-api")
  implementation project(":servicetalk-http-api")
  implementation project(":servicetalk-http-netty")
  implementation project(":servicetalk-http-utils")
  implementation project(":servicetalk-grpc-netty")
  implementation project(":servicetalk-grpc-api")
  implementation project(":servicetalk-buffer-api")
  implementation "org.slf4j:slf4j-api:$slf4jVersion"

  implementation platform("io.opentelemetry:opentelemetry-bom:$opentelemetryVersion")
  implementation "io.opentelemetry:opentelemetry-sdk"
  implementation "io.opentelemetry:opentelemetry-sdk-common"
  implementation "io.opentelemetry:opentelemetry-exporter-common"
  implementation "io.opentelemetry:opentelemetry-exporter-otlp-common"

  testImplementation enforcedPlatform("org.junit:junit-bom:$junit5Version")
  testImplementation "org.junit.jupiter:junit-jupiter-api"
  testImplementation "org.mockito:mockito-core:$mockitoCoreVersion"
  testImplementation "io.opentelemetry:opentelemetry-sdk-testing"
  testImplementation("io.opentelemetry:opentelemetry-exporter-otlp") {
    // Exclude OkHttp sender to force use of ServiceTalk sender via SPI
    exclude group: 'io.opentelemetry', module: 'opentelemetry-exporter-sender-okhttp'
  }
  testImplementation project(":servicetalk-test-resources")
  testImplementation project(":servicetalk-transport-netty-internal")

  // Log4j2 for test logging
  testRuntimeOnly "org.apache.logging.log4j:log4j-slf4j-impl:$log4jVersion"
  testRuntimeOnly "org.apache.logging.log4j:log4j-core:$log4jVersion"
}
